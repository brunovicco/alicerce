name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run complete quality gate
        run: python3 scripts/quality_gate.py

      - name: Build distributions
        run: uv build

  python-matrix:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest

      - name: Reject whitespace errors
        run: git diff --check

  linux-sandbox-conformance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Install bubblewrap
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap
          test -x /usr/bin/bwrap
          test ! -L /usr/bin/bwrap
          /usr/bin/bwrap --version
          dpkg-query --show --showformat='bubblewrap=${Version}\n' bubblewrap

      - name: Configure unprivileged user namespaces
        run: |
          set -euo pipefail
          if sysctl -N kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Require real namespace capability
        env:
          ALICERCE_LINUX_SANDBOX_CONFORMANCE: "1"
        run: |
          uv run --frozen pytest -q -o addopts= tests/test_linux_process_sandbox_conformance.py::test_required_namespace_capability_is_available

      - name: Run adversarial Linux sandbox profile
        env:
          ALICERCE_LINUX_SANDBOX_CONFORMANCE: "1"
        run: |
          uv run --frozen pytest -q -o addopts= tests/test_linux_process_sandbox_conformance.py -k "not required_namespace_capability"
